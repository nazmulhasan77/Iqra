name: iqra
description: "Iqra - AI-Based Daily Quran Recitation Verification and Progress Tracking Application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.11.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3

  # Audio recording and playback
  flutter_sound: ^9.6.0
  record: 6.2.1
  audioplayers: ^6.1.0

  # State management
  provider: ^6.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  http: ^0.13.5
  dio: ^5.7.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Permissions
  permission_handler: ^12.0.3

  # Media
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Uncomment when local assets are added.
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/audio/

  # Uncomment when custom fonts are added.
  # fonts:
  #   - family: YourFont
  #     fonts:
  #       - asset: assets/fonts/YourFont-Regular.ttf
  #       - asset: assets/fonts/YourFont-Bold.ttf
  #         weight: 700